<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="sliceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" filter="url(#shadow)"/>
  
  <!-- Pizza slice -->
  <path d="M50 15 L75 60 Q50 70 25 60 Z" fill="url(#sliceGrad)" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Crust -->
  <path d="M25 60 Q50 70 75 60" fill="none" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Pepperoni circles -->
  <circle cx="50" cy="35" r="6" fill="#dc2626" opacity="0.9"/>
  <circle cx="40" cy="48" r="5" fill="#dc2626" opacity="0.9"/>
  <circle cx="60" cy="48" r="5" fill="#dc2626" opacity="0.9"/>
  
  <!-- Admin gear/cog overlay at bottom right -->
  <g transform="translate(62, 62)">
    <circle cx="0" cy="0" r="14" fill="#1e1b4b" stroke="#f97316" stroke-width="2"/>
    <!-- Gear teeth -->
    <g fill="#f97316">
      <rect x="-2" y="-16" width="4" height="4" rx="1"/>
      <rect x="-2" y="12" width="4" height="4" rx="1"/>
      <rect x="-16" y="-2" width="4" height="4" rx="1"/>
      <rect x="12" y="-2" width="4" height="4" rx="1"/>
      <rect x="-13" y="-13" width="3" height="3" rx="0.5" transform="rotate(45)"/>
      <rect x="10" y="-13" width="3" height="3" rx="0.5" transform="rotate(45)"/>
      <rect x="-13" y="10" width="3" height="3" rx="0.5" transform="rotate(45)"/>
      <rect x="10" y="10" width="3" height="3" rx="0.5" transform="rotate(45)"/>
    </g>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="6" fill="#f97316"/>
    <circle cx="0" cy="0" r="3" fill="#1e1b4b"/>
  </g>
</svg>
